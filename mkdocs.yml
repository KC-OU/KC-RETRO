site_name: KC-RETRO
site_url: https://kierancollins/retro.co.uk
repo_url: https://github.com/KC-OU/KC-RETRO
repo_name: KC-OU/KC-RETRO

theme:
    # Theme: https://squidfunk.github.io/mkdocs-material/
    name: material  
    features:
    # QOL features
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - navigation.tabs.sticky
    - navigation.path
    - toc.follow 
    - navigation.indexes 
    - content.tooltips
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - content.code.annotate
    - announce.dismiss
    logo: assets/logo.png
    favicon: images/favicon.png
    font:
        text: Open Sans
        code: IBM Plex Mono
  
   
  
